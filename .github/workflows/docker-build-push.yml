name: Build and push Docker images

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      FRONTEND_VERSION: v0.1.4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/interesting-items:backend-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/interesting-items:backend-${{ github.sha }}

      - name: Set frontend version env file
        run: echo "VITE_APP_VERSION=${{ env.FRONTEND_VERSION }}" > frontend/.env

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/interesting-items:frontend-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/interesting-items:frontend-${{ github.sha }}
